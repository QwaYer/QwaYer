<svg xmlns="http://www.w3.org/2000/svg" width="900" height="620" viewBox="0 0 900 620">
  <foreignObject width="100%" height="100%">
    <div xmlns="http://www.w3.org/1999/xhtml">
      <style>
        * {
          margin: 0;
          padding: 0;
          box-sizing: border-box;
        }
        body {
          font-family: 'JetBrains Mono', 'Space Grotesk', monospace;
          background: #0a0a0a;
          display: flex;
          justify-content: center;
          align-items: center;
          min-height: 620px;
        }
        .page {
          width: 860px;
          background: #141414;
          border: 1px solid #3d3d3d;
        }
        .header-block {
          padding: 32px 40px;
          border-bottom: 1px solid #2a2a2a;
          background: #141414;
        }
        .username {
          font-size: 36px;
          font-weight: 800;
          color: #e8e8e8;
          font-family: monospace;
        }
        .username span { color: #555; }
        .tagline {
          font-size: 11px;
          color: #888;
          letter-spacing: 0.08em;
          margin: 12px 0 20px 0;
          font-family: monospace;
        }
        .views-badge {
          display: inline-flex;
          border: 1px solid #2a2a2a;
          background: #111;
          padding: 4px 12px;
          font-size: 10px;
          color: #888;
          font-family: monospace;
        }
        .section {
          padding: 28px 40px;
          border-bottom: 1px solid #2a2a2a;
          background: #141414;
        }
        .section-header {
          display: flex;
          align-items: center;
          gap: 12px;
          margin-bottom: 20px;
        }
        .section-number {
          font-size: 9px;
          color: #555;
          font-family: monospace;
        }
        .section-title {
          font-size: 10px;
          font-weight: 700;
          letter-spacing: 0.2em;
          color: #c8c8c8;
          font-family: monospace;
        }
        .title-line {
          flex: 1;
          height: 1px;
          background: #2a2a2a;
        }
        .tech-grid {
          display: flex;
          flex-wrap: wrap;
          gap: 8px;
        }
        .tech-badge {
          border: 1px solid #3d3d3d;
          background: #111;
          padding: 8px 16px;
          font-size: 11px;
          font-weight: 500;
          color: #e8e8e8;
          font-family: monospace;
          display: inline-flex;
          align-items: center;
          gap: 8px;
        }
        .tech-dot {
          width: 8px;
          height: 8px;
          border-radius: 50%;
        }
        .stats-grid {
          display: flex;
          gap: 16px;
          justify-content: space-between;
        }
        .stat-card {
          flex: 1;
          border: 1px solid #2a2a2a;
          background: #111;
          padding: 12px;
          text-align: center;
        }
        .stat-card img {
          width: 100%;
          max-height: 140px;
          object-fit: contain;
        }
        .footer-block {
          padding: 14px 40px;
          background: #0a0a0a;
          display: flex;
          justify-content: space-between;
          font-size: 9px;
          color: #555;
          font-family: monospace;
        }
        .dot-pulse {
          width: 6px;
          height: 6px;
          background: #4ade80;
          border-radius: 50%;
          display: inline-block;
        }
      </style>
      
      <div class="page">
        <div class="header-block">
          <div class="username"><span>//</span> Qwaer80792</div>
          <div class="tagline">Software Developer · C / C# / Rust / Python</div>
          <div class="views-badge">
            <span>Profile views</span>
            <span>288</span>
          </div>
        </div>

        <div class="section">
          <div class="section-header">
            <span class="section-number">01</span>
            <span class="section-title">TECH STACK</span>
            <div class="title-line"></div>
          </div>
          <div class="tech-grid">
            <div class="tech-badge"><div class="tech-dot" style="background:#00599C"></div>C</div>
            <div class="tech-badge"><div class="tech-dot" style="background:#239120"></div>C#</div>
            <div class="tech-badge"><div class="tech-dot" style="background:#ce4a00"></div>Rust</div>
            <div class="tech-badge"><div class="tech-dot" style="background:#3670A0"></div>Python</div>
          </div>
        </div>

        <div class="section">
          <div class="section-header">
            <span class="section-number">02</span>
            <span class="section-title">GITHUB STATS</span>
            <div class="title-line"></div>
          </div>
          <div class="stats-grid">
            <div class="stat-card">
              <img src="https://github-readme-stats.vercel.app/api?username=Qwaer80792&theme=dark&hide_border=true&bg_color=141414&title_color=c8c8c8&text_color=888&icon_color=555" alt="stats">
            </div>
            <div class="stat-card">
              <img src="https://github-readme-stats.vercel.app/api/top-langs/?username=Qwaer80792&theme=dark&hide_border=true&layout=compact&bg_color=141414&title_color=c8c8c8&text_color=888" alt="langs">
            </div>
            <div class="stat-card">
              <img src="https://streak-stats.demolab.com/?user=Qwaer80792&theme=dark&hide_border=true&background=141414&ring=c8c8c8&fire=888&currStreakLabel=c8c8c8&sideLabels=888&dates=555" alt="streak">
            </div>
          </div>
        </div>

        <div class="footer-block">
          <span>github.com/Qwaer80792</span>
          <span><span class="dot-pulse"></span> active</span>
        </div>
      </div>
    </div>
  </foreignObject>
</svg>
